<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ЭзоДвиж · Кабинет ученика</title>
<style>
:root{
  --bg:#0b0910; --bg2:#0f0c16; --panel:#15111f; --panel2:#1b1626;
  --text:#ece9f5; --muted:#9a92b4; --faint:#6f6790;
  --accent:#a855f7; --accent2:#7c3aed; --accent-soft:rgba(168,85,247,.14);
  --border:rgba(168,85,247,.18); --border2:rgba(255,255,255,.06);
  --good:#5ee6a8; --warn:#f0c05a; --bad:#f0736a;
  --serif:'Cormorant Garamond','Georgia','Times New Roman',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:radial-gradient(1200px 800px at 80% -10%,#1a1030 0,var(--bg) 55%) fixed,var(--bg);
  color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--accent)}
h1,h2,h3{font-family:var(--serif);font-weight:600;letter-spacing:.5px;margin:0}
h1{font-size:34px}h2{font-size:24px}h3{font-size:19px}
.muted{color:var(--muted)}.faint{color:var(--faint)}
button{font-family:var(--sans);cursor:pointer;border:none}
input,textarea,select{font-family:var(--sans);font-size:14px;color:var(--text);background:var(--panel2);
  border:1px solid var(--border);border-radius:10px;padding:10px 12px;width:100%;outline:none;transition:border .15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px 2px;letter-spacing:.3px}
.btn{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;padding:11px 20px;border-radius:12px;
  font-weight:600;font-size:14px;letter-spacing:.3px;transition:transform .1s,box-shadow .2s;box-shadow:0 6px 20px rgba(124,58,237,.25)}
.btn:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(124,58,237,.4)}
.btn:active{transform:translateY(0)}
.btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text);box-shadow:none}
.btn.ghost:hover{background:var(--accent-soft)}
.btn.sm{padding:7px 14px;font-size:13px;border-radius:9px}
.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--border2);border-radius:18px;padding:22px}
.pill{display:inline-block;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);
  background:var(--accent-soft);border:1px solid var(--border);border-radius:100px;padding:4px 11px}
.hide{display:none!important}
.moon{font-size:22px;filter:drop-shadow(0 0 8px rgba(168,85,247,.6))}

/* AUTH */
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
#auth .card{width:100%;max-width:410px;text-align:center}
#auth .brand{font-family:var(--serif);font-size:30px;letter-spacing:2px}
.auth-tabs{display:flex;gap:8px;margin:20px 0 16px}
.auth-tabs button{flex:1;background:transparent;color:var(--muted);padding:9px;border-radius:10px;border:1px solid transparent;font-size:14px}
.auth-tabs button.on{color:var(--text);border-color:var(--border);background:var(--accent-soft)}
#auth .field{text-align:left;margin-bottom:12px}
.err{color:var(--bad);font-size:13px;min-height:18px;margin-top:4px}

/* SHELL */
#app{display:grid;grid-template-columns:238px 1fr;min-height:100vh}
#side{background:linear-gradient(180deg,var(--panel),var(--bg));border-right:1px solid var(--border2);
  padding:24px 16px;position:sticky;top:0;height:100vh;overflow:auto}
.logo{font-family:var(--serif);font-size:22px;letter-spacing:2px;padding:0 8px 4px}
.logo small{display:block;font-family:var(--sans);font-size:10px;letter-spacing:3px;color:var(--faint);text-transform:uppercase;margin-top:2px}
nav{margin-top:22px;display:flex;flex-direction:column;gap:3px}
nav a{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;color:var(--muted);
  text-decoration:none;font-size:14px;transition:.15s;cursor:pointer}
nav a:hover{color:var(--text);background:var(--accent-soft)}
nav a.on{color:var(--text);background:var(--accent-soft);border:1px solid var(--border)}
nav a .ic{font-size:16px;width:20px;text-align:center}
.side-foot{margin-top:22px;padding-top:16px;border-top:1px solid var(--border2);font-size:13px}
#main{padding:34px 40px 80px;max-width:1080px}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}
@media(max-width:900px){#app{grid-template-columns:1fr}#side{position:fixed;z-index:40;transform:translateX(-100%);width:238px;transition:.25s}
  #side.open{transform:none}#main{padding:20px 18px 70px}.g2,.g3{grid-template-columns:1fr}
  #burger{display:flex!important}}
#burger{display:none;position:fixed;top:14px;left:14px;z-index:50;background:var(--panel);border:1px solid var(--border);
  color:var(--text);width:42px;height:42px;border-radius:12px;align-items:center;justify-content:center;font-size:20px}

/* misc components */
.stat{display:flex;flex-direction:column;gap:2px}
.stat .n{font-family:var(--serif);font-size:32px}
.stat .l{font-size:12px;color:var(--muted);letter-spacing:.4px}
.bar{height:9px;background:var(--panel2);border-radius:100px;overflow:hidden;border:1px solid var(--border2)}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:100px;transition:width .5s}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.between{justify-content:space-between}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border2);vertical-align:top}
th{color:var(--muted);font-weight:500;font-size:11px;letter-spacing:.5px;text-transform:uppercase}
.tag{font-size:11px;padding:3px 9px;border-radius:100px;background:var(--accent-soft);border:1px solid var(--border);color:var(--accent);white-space:nowrap}
.list-item{border:1px solid var(--border2);border-radius:13px;padding:14px;margin-bottom:10px;background:var(--panel2)}
.q-opt{border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin:8px 0;cursor:pointer;transition:.15s;background:var(--panel2)}
.q-opt:hover{border-color:var(--accent)}
.q-opt.sel{background:var(--accent-soft);border-color:var(--accent)}
.q-opt.correct{border-color:var(--good);background:rgba(94,230,168,.1)}
.q-opt.wrong{border-color:var(--bad);background:rgba(240,115,106,.1)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--panel);
  border:1px solid var(--accent);color:var(--text);padding:13px 22px;border-radius:13px;box-shadow:0 12px 40px rgba(0,0,0,.5);
  transition:transform .3s;z-index:60;font-size:14px}
.toast.show{transform:translateX(-50%) translateY(0)}
/* Tarot-style card of the day */
.tarot{perspective:1200px}
.tarot-inner{position:relative;background:
   radial-gradient(120% 90% at 50% -10%,rgba(168,85,247,.28),transparent 60%),
   linear-gradient(160deg,#251540 0,#170e24 55%,#120b1c 100%);
  border:1.5px solid rgba(212,175,120,.45);border-radius:20px;padding:30px 26px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 0 60px rgba(168,85,247,.08);overflow:hidden;
  animation:draw .55s cubic-bezier(.2,.8,.2,1)}
@keyframes draw{from{opacity:0;transform:rotateY(28deg) translateY(10px)}to{opacity:1;transform:none}}
.tarot-inner::before,.tarot-inner::after{content:'✦';position:absolute;color:rgba(212,175,120,.6);font-size:13px}
.tarot-inner::before{top:12px;left:14px}.tarot-inner::after{bottom:12px;right:14px}
.tarot-frame{position:absolute;inset:8px;border:1px solid rgba(212,175,120,.2);border-radius:14px;pointer-events:none}
.tarot-sym{font-size:46px;filter:drop-shadow(0 0 14px rgba(168,85,247,.6));margin-bottom:6px}
.tarot-name{font-family:var(--serif);font-size:26px;letter-spacing:3px;text-transform:uppercase;color:#e7d3a8}
.tarot-eyebrow{letter-spacing:3px;font-size:10px;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.tarot-div{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,120,.7),transparent);margin:12px auto}
.tarot-msg{font-family:var(--serif);font-size:19px;line-height:1.5;color:var(--text);max-width:520px;margin:0 auto}
.icircle{width:34px;height:34px;border-radius:50%;background:var(--accent-soft);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hr{height:1px;background:var(--border2);margin:18px 0}
.mini{font-size:12px;color:var(--faint)}
</style>
</head>
<body>

<!-- ============ AUTH ============ -->
<div id="auth">
  <div class="card">
    <div class="moon">☾</div>
    <div class="brand">ЭзоДвиж</div>
    <div class="mini" style="letter-spacing:3px;text-transform:uppercase;margin-top:4px">Кабинет ученика</div>
    <div class="auth-tabs">
      <button id="tab-login" class="on" onclick="setAuthMode('login')">Вход</button>
      <button id="tab-reg" onclick="setAuthMode('reg')">Регистрация</button>
    </div>
    <div class="field"><label>Логин</label><input id="au-user" autocomplete="username" placeholder="ваше имя"></div>
    <div class="field"><label>Пароль</label><input id="au-pass" type="password" autocomplete="current-password" placeholder="••••••"></div>
    <div id="au-namewrap" class="field hide"><label>Как тебя зовут</label><input id="au-name" placeholder="Имя"></div>
    <div class="err" id="au-err"></div>
    <button class="btn" style="width:100%" onclick="doAuth()" id="au-btn">Войти</button>
    <div class="mini" style="margin-top:14px">Данные хранятся в этом браузере. Один аккаунт — одно устройство.</div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hide">
  <button id="burger" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
  <aside id="side">
    <div class="logo">ЭзоДвиж<small>кабинет ученика</small></div>
    <nav id="nav"></nav>
    <div class="side-foot">
      <div class="row between"><span class="muted" id="who">—</span></div>
      <button class="btn ghost sm" style="margin-top:10px;width:100%" onclick="logout()">Выйти</button>
    </div>
  </aside>
  <main id="main"></main>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= STORAGE ================= */
const LS_USERS='ezo_users_v1', LS_SESSION='ezo_session_v1';
const store={
  users(){try{return JSON.parse(localStorage.getItem(LS_USERS))||{}}catch(e){return {}}},
  saveUsers(u){localStorage.setItem(LS_USERS,JSON.stringify(u))},
  session(){return localStorage.getItem(LS_SESSION)},
  setSession(u){u?localStorage.setItem(LS_SESSION,u):localStorage.removeItem(LS_SESSION)}
};
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0}return 'h'+h}
let U=null; // current user object (reference into users store)
let USERNAME=null;
function persist(){const u=store.users();u[USERNAME]=U;store.saveUsers(u)}
function blankData(name){return{
  name:name||'',created:new Date().toISOString().slice(0,10),
  survey:{}, tests:{}, sales:{entries:[],reels:[]},
  notebook:{notes:'',plan:[]}, homework:[],
  calls:{total:8,done:0,next:''}, card:{date:'',idx:0}, settings:{webhook:''}
}}

/* ================= CONTENT ================= */
let THEMES=[
 'Позиционирование и ниша','Боли и подболи','Триггеры и хуки','Заголовки',
 'Язык результата','Контент-план и рубрики','Рилс на охваты','Рилс на воронку',
 'Актуальные и упаковка','Прогревы','Продуктовая линейка','Продажи и воронки'
];

let TESTS_ENABLED=false;
let CARD_MSGS=[
 {sym:'🔥',name:'Костёр',m:'Нас, ведьм, веками сжигали за то, что мы ЗНАЛИ. Твой страх проявиться — это память тела, а не сегодняшняя опасность. Костёр давно потух. Выходи в свет.'},
 {sym:'👑',name:'Налог',m:'Хейт — это налог на популярность. Прилетело — значит, тебя стало видно. Плати спокойствием и работай дальше.'},
 {sym:'🤝',name:'Доверие',m:'Без доверия не бывает продаж. Люди покупают не расклад — они покупают ТЕБЯ. Дай себя узнать.'},
 {sym:'🌉',name:'Мост',m:'Сильный контент = что Я хочу донести + что клиенту нужно услышать. Соедини два берега — тогда попадёшь.'},
 {sym:'⚡',name:'Искра',m:'Не бойся вызывать эмоции. Начни с простого — любопытство и удивление. Эмоция решает, досмотрят ли до конца.'},
 {sym:'🪥',name:'Ритуал',m:'Контент — это рутина, как почистить зубы. Не вдохновение, а привычка. Сделай сегодня, даже если «не то настроение».'},
 {sym:'🎭',name:'Маска',m:'Перфекционизм — это скрытая форма саботажа. «Ещё не идеально» часто значит «я боюсь». Выложи как есть.'},
 {sym:'🌙',name:'Творец',m:'Только ты строишь свою реальность. Не алгоритмы, не хейтеры, не «а вдруг». Ты.'},
 {sym:'💰',name:'Золото',m:'Блог — единственное место, где на своих кринж- и треш-историях можно зарабатывать деньги. Не прячь их.'},
 {sym:'💎',name:'Правда',m:'В искренности — вся сила. Отшлифованное скользит мимо, живое цепляет и остаётся.'},
 {sym:'📸',name:'Сейчас',m:'Сними контент прямо сейчас — чем бы ты ни занималась. Фото или видео, 10 секунд. Материал важнее повода.'},
 {sym:'🔄',name:'Наоборот',m:'Когда сложно — помни: в мире всё работает наоборот. Перед тем как накачать мышцы, чувствуешь слабость. Перед тем как поумнеть — глупость. Ты просто в начале.'},
 {sym:'🕯️',name:'Свет',m:'Ведьма — это путь помощи людям. Но он невозможен, если о тебе никто не знает. Заявить о себе — часть служения.'},
 {sym:'📖',name:'История',m:'Люди любят не нравоучения, а живые истории. Не учи — рассказывай.'},
 {sym:'✨',name:'Зеркало',m:'Ты красивая во всех ракурсах. Помни об этом, когда рука тянется удалить кадр.'},
 {sym:'🦋',name:'Проявление',m:'Страх показаться — не факт, а привычка прятаться. Один пост сегодня растворяет его сильнее любой мантры.'},
 {sym:'🌀',name:'Касание',m:'Один пост не продаёт — продаёт система касаний. Твоё дело — просто не пропадать.'},
 {sym:'🔮',name:'Свои',m:'Тебя не должны любить все. Тебя должны найти свои. Пиши для них — и они придут.'}
];

// QUIZZES — data-driven
let QUIZZES=[
{id:'headlines',theme:'Заголовки',title:'Триггерные заголовки',icon:'🎯',items:[
  {type:'choice',q:'Какой заголовок ТРИГГЕРНЕЕ?',opts:[
    'Как научиться делать расклады',
    'Расклад, который за 5 минут показывает — врёт он или нет'],correct:1,
    exp:'Второй: конкретика + интрига + быстрый результат. Первый — «про процесс», без крючка.'},
  {type:'choice',q:'Где сильнее крючок?',opts:[
    'Мои услуги и цены',
    'Сколько стоит расклад, после которого она ушла от абьюзера'],correct:1,
    exp:'Второй бьёт в результат и историю, а не в сухой список услуг.'},
  {type:'count',q:'Сколько триггеров в заголовке: «Только сегодня — бесплатный разбор, который покажет, почему он молчит. Осталось 3 места».',
    correct:4,exp:'Срочность («только сегодня»), бесплатно, интрига/боль («почему он молчит»), дефицит («3 места») = 4.'},
  {type:'count',q:'Сколько триггеров: «Я молчала 2 года и чуть не потеряла блог — вот что меня спасло».',
    correct:3,exp:'Личная история/уязвимость, интрига («что спасло»), высокая ставка/страх потери = 3.'},
  {type:'choice',q:'Что сильнее останавливает скролл?',opts:[
    'Немного об энергиях этой недели',
    'Если он резко похолодел — читай, пока не поздно'],correct:1,
    exp:'Второй: прямое обращение + боль + срочность.'}
]},
{id:'result',theme:'Язык результата',title:'Язык результата vs процесса',icon:'✨',items:[
  {type:'choice',q:'Где ЯЗЫК РЕЗУЛЬТАТА?',opts:[
    'Делаю чистку денежного канала','Через месяц перестаёшь считать до зарплаты и впервые откладываешь'],correct:1,
    exp:'Результат = что меняется в жизни клиента, а не название процедуры.'},
  {type:'choice',q:'Выбери формулировку через результат:',opts:[
    'Провожу диагностику по фото и картам','За час на созвоне называю, что именно ломает твою жизнь, и что делать'],correct:1,
    exp:'Второй описывает исход для клиента.'},
  {type:'choice',q:'Что из этого — результат, а не процесс?',opts:[
    'Работаю с энергетикой и блоками','Встаёшь утром без кома в груди и без мысли всё бросить'],correct:1,
    exp:'Ощущение ПОСЛЕ = язык результата.'},
  {type:'choice',q:'Результат:',opts:[
    'Расторгаю астральные контракты','Перестаёшь тянуть на себе всех — силы наконец остаются тебе'],correct:1,
    exp:'Второй понятен клиенту и показывает выгоду.'}
]},
{id:'podboli',theme:'Боли и подболи',title:'ПодБоли: заземли абстракцию',icon:'🕯️',items:[
  {type:'open',q:'Пофантазируй: какие подБоли (конкретные сцены из жизни) выходят из боли «Не знаю, где моё предназначение»? Напиши 3.',
    sample:'• По утрам оттягиваешь момент открыть ноут с работой, которую выбрала 10 лет назад «потому что надо».\n• Смотришь, как подруга горит своим делом, и ловишь ком: «а я так и не поняла, чего хочу».\n• В отпуске ловишь себя на мысли «не хочу возвращаться» — и снова глушишь её сериалом.'},
  {type:'open',q:'Боль: «Он охладел». Распиши 3 подболи-сцены.',
    sample:'• Заходишь в его сторис в 2 ночи, видишь «был недавно» и закрываешь телефон с комом.\n• Он отвечает раз в сутки сухим «ок», а ты перечитываешь переписку и ищешь, что не так.\n• На людях он «нормальный», а наедине — телефон важнее тебя.'},
  {type:'open',q:'Боль: «Нет денег». Распиши 3 подболи-сцены.',
    sample:'• В конце месяца считаешь, хватит ли на аренду, и переносишь стоматолога на «потом».\n• В магазине смотришь на ценник и молча кладёшь обратно.\n• Отменяешь встречу с подругами, потому что «сейчас не потяну кафе».'}
]}
];

let PLAN_GOALS=['Продажа','Прогрев к личности','Экспертность','Прогрев к продукту','Охват'];
let PLAN_FORMATS=['Рилс','Сторис','Пост','Карусель','Бесплатник'];

/* Load content overrides: admin preview (localStorage) → content.json → built-in defaults */
async function loadContent(){
  let c=null;
  try{const o=localStorage.getItem('ezo_content_v1'); if(o)c=JSON.parse(o);}catch(e){}
  if(!c){try{const r=await fetch('content.json',{cache:'no-store'}); if(r.ok)c=await r.json();}catch(e){}}
  if(c){
    if(Array.isArray(c.themes)&&c.themes.length)THEMES=c.themes;
    if(Array.isArray(c.cards)&&c.cards.length)CARD_MSGS=c.cards;
    if(Array.isArray(c.quizzes)&&c.quizzes.length)QUIZZES=c.quizzes;
    if(Array.isArray(c.planGoals)&&c.planGoals.length)PLAN_GOALS=c.planGoals;
    if(Array.isArray(c.planFormats)&&c.planFormats.length)PLAN_FORMATS=c.planFormats;
    if(typeof c.testsEnabled==='boolean')TESTS_ENABLED=c.testsEnabled;
  }
}

let authMode='login';
function setAuthMode(m){authMode=m;
  document.getElementById('tab-login').classList.toggle('on',m==='login');
  document.getElementById('tab-reg').classList.toggle('on',m==='reg');
  document.getElementById('au-namewrap').classList.toggle('hide',m!=='reg');
  document.getElementById('au-btn').textContent=m==='login'?'Войти':'Создать аккаунт';
  document.getElementById('au-err').textContent='';
}
function doAuth(){
  const user=document.getElementById('au-user').value.trim().toLowerCase();
  const pass=document.getElementById('au-pass').value;
  const err=document.getElementById('au-err');
  if(!user||!pass){err.textContent='Заполни логин и пароль';return}
  const users=store.users();
  if(authMode==='reg'){
    if(users[user]){err.textContent='Такой логин уже есть';return}
    const name=document.getElementById('au-name').value.trim();
    users[user]={pass:hash(pass),data:blankData(name)};
    store.saveUsers(users);
    login(user);
  }else{
    if(!users[user]||users[user].pass!==hash(pass)){err.textContent='Неверный логин или пароль';return}
    login(user);
  }
}

let quizState=null; // {id, answers:{}, checked:bool}
function themePassed(theme){const s=U.survey[theme];return !!(s&&s.level==='Понятно')}
function quizLocked(q){return !themePassed(q.theme)}
function pgTests(){
  if(quizState){return renderQuiz()}
  const head=`<div class="page-head"><div><span class="pill">Тесты</span><h1 style="margin-top:10px">Проверка усвоения</h1>
    <div class="muted">Тест открывается после того, как отметишь тему пройденной в опроснике.</div></div></div>`;
  if(!TESTS_ENABLED){
    return head+`<div class="card" style="text-align:center;padding:40px">
      <div style="font-size:34px">🔒</div><h3 style="margin-top:10px">Тесты скоро откроются</h3>
      <div class="muted" style="margin-top:6px">Раздел готовится. Пока проходи темы и заполняй опросник — как только тесты включат, они появятся здесь.</div></div>`;
  }
  let cards=QUIZZES.map(q=>{
    const res=U.tests[q.id];
    const locked=quizLocked(q);
    if(locked){
      return `<div class="card" style="opacity:.7">
        <div class="row between"><h3>🔒 ${q.icon} ${esc(q.title)}</h3><span class="mini">закрыт</span></div>
        <div class="muted" style="margin-top:6px">Сначала пройди тему «${esc(q.theme)}» и отметь её «Понятно» в опроснике.</div>
        <button class="btn ghost sm" style="margin-top:10px" onclick="go('survey')">Открыть опросник</button></div>`;
    }
    const badge=res?`<span class="tag">✓ ${res.score}/${res.total}</span>`:`<span class="mini">не пройден</span>`;
    return `<div class="card" style="cursor:pointer" onclick="startQuiz('${q.id}')">
      <div class="row between"><h3>${q.icon} ${esc(q.title)}</h3>${badge}</div>
      <div class="muted" style="margin-top:6px">Тема: ${esc(q.theme)} · ${q.items.length} заданий</div></div>`}).join('');
  return head+`<div class="grid" style="gap:14px">${cards}</div>`;
}
function startQuiz(id){const q=QUIZZES.find(x=>x.id===id);
  if(!TESTS_ENABLED){return toast('Тесты пока закрыты')}
  if(q&&quizLocked(q)){return toast('Сначала пройди тему «'+q.theme+'»')}
  quizState={id,answers:{},checked:false};render()}
function renderQuiz(){
  const q=QUIZZES.find(x=>x.id===quizState.id);
  const items=q.items.map((it,i)=>{
    if(it.type==='choice'){
      const opts=it.opts.map((o,oi)=>{
        let cls='q-opt';const sel=quizState.answers[i]===oi;
        if(quizState.checked){if(oi===it.correct)cls+=' correct';else if(sel)cls+=' wrong'}
        else if(sel)cls+=' sel';
        return `<div class="${cls}" onclick="pickOpt(${i},${oi})">${esc(o)}</div>`}).join('');
      return `<div class="list-item"><b>${i+1}. ${esc(it.q)}</b>${opts}
        ${quizState.checked?`<div class="mini" style="margin-top:6px">💡 ${esc(it.exp)}</div>`:''}</div>`;
    }
    if(it.type==='count'){
      const v=quizState.answers[i]??'';
      let fb='';if(quizState.checked){const ok=Number(v)===it.correct;
        fb=`<div class="mini" style="margin-top:6px;color:${ok?'var(--good)':'var(--bad)'}">${ok?'Верно!':'Правильный ответ: '+it.correct} · ${esc(it.exp)}</div>`}
      return `<div class="list-item"><b>${i+1}. ${esc(it.q)}</b>
        <input type="number" style="max-width:120px;margin-top:8px" value="${v}" ${quizState.checked?'disabled':''}
          oninput="quizState.answers[${i}]=this.value">${fb}</div>`;
    }
    // open
    const v=quizState.answers[i]??'';
    return `<div class="list-item"><b>${i+1}. ${esc(it.q)}</b>
      <textarea style="margin-top:8px" oninput="quizState.answers[${i}]=this.value" placeholder="Твой вариант...">${esc(v)}</textarea>
      ${quizState.checked?`<div class="mini" style="margin-top:8px"><b>Пример-эталон:</b><br>${esc(it.sample).replace(/\n/g,'<br>')}</div>`:''}</div>`;
  }).join('');
  const foot=quizState.checked
    ? `<button class="btn" onclick="finishQuiz()">Готово</button> <button class="btn ghost" onclick="startQuiz('${q.id}')">Пройти заново</button>`
    : `<button class="btn" onclick="checkQuiz()">Проверить</button> <button class="btn ghost" onclick="quizState=null;render()">Назад</button>`;
  return `<div class="page-head"><div><span class="pill">${esc(q.theme)}</span><h1 style="margin-top:10px">${q.icon} ${esc(q.title)}</h1></div></div>
    ${items}<div class="row" style="margin-top:16px">${foot}</div>`;
}
function pickOpt(i,oi){if(quizState.checked)return;quizState.answers[i]=oi;render()}
function checkQuiz(){
  const q=QUIZZES.find(x=>x.id===quizState.id);
  let score=0,auto=0;
  q.items.forEach((it,i)=>{
    if(it.type==='choice'){auto++;if(quizState.answers[i]===it.correct)score++}
    else if(it.type==='count'){auto++;if(Number(quizState.answers[i])===it.correct)score++}
  });
  quizState.checked=true;quizState._score=score;quizState._auto=auto;render();
}
function finishQuiz(){
  const q=QUIZZES.find(x=>x.id===quizState.id);
  U.tests[q.id]={score:quizState._score||0,total:quizState._auto||q.items.length,date:today()};
  persist();quizState=null;toast('Результат сохранён ✓');render();
}

  const h=collectHW();if(!h.text)return toast('Напиши ответ');
  h.sent=false;
  if(U.settings.webhook){
    try{await fetch(U.settings.webhook,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({student:U.name||USERNAME,theme:h.theme,text:h.text})});h.sent=true;toast('Отправлено преподавателю ✓')}
    catch(e){toast('Не удалось отправить — сохранено локально')}
  }else{toast('Сохранено. Автоотправка пока не настроена')}
  U.homework.push(h);persist();render();
}
function downloadHW(){const h=collectHW();if(!h.text)return toast('Напиши ответ');
  const blob=new Blob([`ЭзоДвиж — домашка\nУченик: ${U.name||USERNAME}\nТема: ${h.theme}\nДата: ${h.date}\n\n${h.text}`],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`домашка_${h.theme}.txt`;a.click()}

/* ---------- SETTINGS ---------- */
function pgSettings(){
  return `<div class="page-head"><div><span class="pill">Настройки</span><h1 style="margin-top:10px">Настройки</h1></div></div>
  <div class="card"><h3>Профиль</h3><div class="hr"></div>
    <label>Имя</label><input value="${esc(U.name||'')}" oninput="U.name=this.value;persist();document.getElementById('who').textContent='☾ '+(U.name||USERNAME)">
  </div>
  <div class="card" style="margin-top:16px"><h3>Созвоны</h3><div class="hr"></div>
    <div class="row"><div style="flex:1"><label>Всего созвонов</label><input type="number" value="${U.calls.total}" oninput="U.calls.total=+this.value;persist()"></div>
    <div style="flex:1"><label>Проведено</label><input type="number" value="${U.calls.done}" oninput="U.calls.done=+this.value;persist()"></div>
    <div style="flex:1"><label>Следующий</label><input type="date" value="${esc(U.calls.next)}" oninput="U.calls.next=this.value;persist()"></div></div>
  </div>
  <div class="card" style="margin-top:16px"><h3>Telegram-бот преподавателя</h3><div class="hr"></div>
    <label>Webhook-URL для приёма домашки (заполняет преподаватель)</label>
    <input value="${esc(U.settings.webhook)}" placeholder="https://..." oninput="U.settings.webhook=this.value;persist()">
    <div class="mini" style="margin-top:8px">Когда бот будет готов, сюда впишется адрес — и домашки начнут приходить в Telegram автоматически.</div>
  </div>
  <div class="card" style="margin-top:16px"><h3>Данные</h3><div class="hr"></div>
    <button class="btn ghost" onclick="exportData()">Скачать мои данные (backup)</button></div>`;
}
function exportData(){const blob=new Blob([JSON.stringify(U,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ezodvizh_backup.json';a.click()}

/* ================= INIT ================= */
(async function init(){
  setAuthMode('login');
  await loadContent();
  const s=store.session();
  if(s&&store.users()[s]){USERNAME=s;boot()}
})();
</script>
